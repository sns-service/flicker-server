services:
  flicker-app-blue:
    image: ${IMAGE_URI}
    container_name: flicker-app-blue
    restart: unless-stopped
    networks:
      - flicker-net
    ports:
      - "8080:8080"
    environment: &app_env
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_ACCESS_KEY: ${JWT_ACCESS_KEY}
      JWT_REFRESH_KEY: ${JWT_REFRESH_KEY}
      S3_BUCKET: ${S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
    profiles: ["blue"]

  flicker-app-green:
    image: ${IMAGE_URI}
    container_name: flicker-app-green
    restart: unless-stopped
    networks:
      - flicker-net
    ports:
      - "8081:8080"
    environment: *app_env
    profiles: ["green"]

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - flicker-net
    volumes:
      - /home/ubuntu/redis-data:/data
    command: redis-server --appendonly yes

networks:
  flicker-net:
    name: flicker-net
    external: true