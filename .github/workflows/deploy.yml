name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행 가능

permissions:
  id-token: write   # OIDC JWT 토큰 발급에 필요
  contents: read    # 리포 체크아웃에 필요

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: flicker

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "🏷️  Image tag: ${IMAGE_TAG}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          
          docker build \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }} \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Push to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          echo "✅ Pushed: ${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }}"