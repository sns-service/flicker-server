name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: flicker

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      ecr-registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "🏷️  Image tag: ${IMAGE_TAG}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }} \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Push to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          echo "✅ Pushed: ${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }}"

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM Run Command
        id: ssm-deploy
        run: |
          # EC2에서 실행할 스크립트
          DEPLOY_SCRIPT=$(cat <<'EOF'
          set -e

          REGION="${AWS_REGION}"
          REGISTRY="${ECR_REGISTRY}"
          REPO="${ECR_REPOSITORY}"
          TAG="${IMAGE_TAG}"

          echo "==> ECR 로그인"
          aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${REGISTRY}

          echo "==> 새 이미지 pull"
          docker pull ${REGISTRY}/${REPO}:${TAG}

          echo "==> 기존 컨테이너 중지·제거"
          docker rm -f flicker-app 2>/dev/null || true

          echo "==> 새 컨테이너 실행 (prod 프로파일)"
          docker run -d \
            --name flicker-app \
            --network flicker-net \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e DB_HOST="${DB_HOST}" \
            -e DB_PORT="${DB_PORT}" \
            -e DB_NAME="${DB_NAME}" \
            -e DB_USERNAME="${DB_USERNAME}" \
            -e DB_PASSWORD="${DB_PASSWORD}" \
            -e REDIS_HOST="${REDIS_HOST}" \
            -e REDIS_PORT="${REDIS_PORT}" \
            -e JWT_ACCESS_KEY="${JWT_ACCESS_KEY}" \
            -e JWT_REFRESH_KEY="${JWT_REFRESH_KEY}" \
            -e S3_BUCKET="${S3_BUCKET}" \
            -e AWS_REGION="${REGION}" \
            ${REGISTRY}/${REPO}:${TAG}

          echo "==> 사용하지 않는 이미지 정리"
          docker image prune -af --filter "until=24h" || true

          echo "==> Smoke test (최대 60초 대기)"
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health > /dev/null 2>&1 || curl -fsS http://localhost:8080/ > /dev/null 2>&1; then
              echo "✅ Health check 통과 (${i}회 시도)"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done

          echo "❌ Health check 실패"
          docker logs --tail 50 flicker-app
          exit 1
          EOF
          )

          # SSM에 환경변수 + 스크립트 전송
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy flicker ${{ needs.build-and-push.outputs.image-tag }}" \
            --parameters commands="[\"$(echo "${DEPLOY_SCRIPT}" | sed 's/"/\\"/g' | tr '\n' ' ')\"]" \
            --query "Command.CommandId" \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          echo "Command ID: ${COMMAND_ID}"
          echo "command-id=${COMMAND_ID}" >> $GITHUB_OUTPUT

        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          JWT_ACCESS_KEY: ${{ secrets.JWT_ACCESS_KEY }}
          JWT_REFRESH_KEY: ${{ secrets.JWT_REFRESH_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}

      - name: Wait for SSM command to complete
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command-id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          echo "==> SSM 명령 실행 대기 중..."
          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --region ${{ env.AWS_REGION }} \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[${i}/60] Status: ${STATUS}"

            case "${STATUS}" in
              Success)
                echo "✅ 배포 성공"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --region ${{ env.AWS_REGION }} \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "❌ 배포 실패 (${STATUS})"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --region ${{ env.AWS_REGION }} \
                  --query "StandardErrorContent" \
                  --output text
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "❌ Timeout"
          exit 1