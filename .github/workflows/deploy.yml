name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: flicker

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      ecr-registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "🏷️  Image tag: ${IMAGE_TAG}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }} \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Push to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          echo "✅ Pushed: ${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image-tag }}"

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send deployment command via SSM
        id: ssm-deploy
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy flicker ${IMAGE_TAG}" \
            --region ${{ env.AWS_REGION }} \
            --parameters '{
              "commands": [
                "set -e",
                "export REGISTRY='"${ECR_REGISTRY}"'",
                "export REPO='"${{ env.ECR_REPOSITORY }}"'",
                "export TAG='"${IMAGE_TAG}"'",
                "echo \"==> ECR 로그인\"",
                "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY",
                "echo \"==> 새 이미지 pull\"",
                "docker pull $REGISTRY/$REPO:$TAG",
                "echo \"==> 기존 컨테이너 제거\"",
                "docker rm -f flicker-app 2>/dev/null || true",
                "echo \"==> 새 컨테이너 실행\"",
                "docker run -d --name flicker-app --network flicker-net -p 8080:8080 -e SPRING_PROFILES_ACTIVE=prod -e DB_HOST='"${{ secrets.DB_HOST }}"' -e DB_PORT='"${{ secrets.DB_PORT }}"' -e DB_NAME='"${{ secrets.DB_NAME }}"' -e DB_USERNAME='"${{ secrets.DB_USERNAME }}"' -e DB_PASSWORD='"${{ secrets.DB_PASSWORD }}"' -e REDIS_HOST='"${{ secrets.REDIS_HOST }}"' -e REDIS_PORT='"${{ secrets.REDIS_PORT }}"' -e JWT_ACCESS_KEY='"${{ secrets.JWT_ACCESS_KEY }}"' -e JWT_REFRESH_KEY='"${{ secrets.JWT_REFRESH_KEY }}"' -e S3_BUCKET='"${{ secrets.S3_BUCKET }}"' -e AWS_REGION=${{ env.AWS_REGION }} $REGISTRY/$REPO:$TAG",
                "echo \"==> 이미지 정리\"",
                "docker image prune -af --filter \"until=24h\" || true",
                "echo '==> Smoke test'",
                "for i in $(seq 1 30); do",
                "  if curl -fsS http://localhost:8080/actuator/health > /dev/null 2>&1; then",
                "    echo \"[health] OK after ${i} tries\"",
                "    break",
                "  fi",
                "  if [ $i -eq 30 ]; then",
                "    echo '[health] FAILED'; docker logs --tail 50 flicker-app; exit 1",
                "  fi",
                "  sleep 2",
                "done",
                "echo '==> Endpoint check'",
                "HEALTH_TIME=$(curl -o /dev/null -s -w '%{time_total}' http://localhost:8080/actuator/health)",
                "ROOT_STATUS=$(curl -o /dev/null -s -w '%{http_code}' http://localhost:8080/)",
                "echo \"[health] response_time=${HEALTH_TIME}s\"",
                "echo \"[root] http_code=${ROOT_STATUS}\"",
                "if [ \"${ROOT_STATUS}\" != \"200\" ] && [ \"${ROOT_STATUS}\" != \"302\" ] && [ \"${ROOT_STATUS}\" != \"401\" ]; then",
                "  echo 'Root endpoint unexpected status'; exit 1",
                "fi",
                "echo '✅ All smoke tests passed'"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)
          
          echo "Command ID: ${COMMAND_ID}"
          echo "command-id=${COMMAND_ID}" >> $GITHUB_OUTPUT

      - name: Wait for SSM command to complete
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command-id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          
          echo "==> SSM 명령 실행 대기 중..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --region ${{ env.AWS_REGION }} \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
          
            echo "[${i}/60] Status: ${STATUS}"
          
            if [ "${STATUS}" = "Success" ]; then
              echo "✅ 배포 성공"
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardOutputContent" \
                --output text
              exit 0
            fi
          
            if [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              echo "❌ 배포 실패 (${STATUS})"
              echo "--- STDOUT ---"
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardOutputContent" \
                --output text
              echo "--- STDERR ---"
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
          
            sleep 5
          done
          
          echo "❌ Timeout"
          exit 1

      - name: Notify success via SES
        if: success()
        run: |
          aws ses send-email \
          --region ${{ env.AWS_REGION }} \
          --from "${{ secrets.SES_FROM_EMAIL }}" \
          --destination "ToAddresses=${{ secrets.SES_TO_EMAIL }}" \
          --message "Subject={Data='[Flicker] 배포 성공 - ${{ needs.build-and-push.outputs.image-tag }}',Charset=utf-8},Body={Html={Data='<h2>✅ Flicker 배포 성공</h2><ul><li><b>Image:</b> ${{ needs.build-and-push.outputs.image-tag }}</li><li><b>Branch:</b> ${{ github.ref_name }}</li><li><b>Actor:</b> ${{ github.actor }}</li><li><b>Commit:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}\">${{ github.sha }}</a></li><li><b>Workflow:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">실행 로그</a></li></ul>',Charset=utf-8}}"

      - name: Notify failure via SES
        if: failure()
        run: |
          aws ses send-email \
            --region ${{ env.AWS_REGION }} \
            --from "${{ secrets.SES_FROM_EMAIL }}" \
            --destination "ToAddresses=${{ secrets.SES_TO_EMAIL }}" \
            --message "Subject={Data='[Flicker] 🚨 배포 실패',Charset=utf-8},Body={Html={Data='<h2>❌ Flicker 배포 실패</h2><ul><li><b>Branch:</b> ${{ github.ref_name }}</li><li><b>Actor:</b> ${{ github.actor }}</li><li><b>Commit:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}\">${{ github.sha }}</a></li><li><b>Workflow:</b> <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">실행 로그 (디버깅)</a></li></ul><p>SSM 로그는 워크플로우 실행 페이지에서 확인 가능합니다.</p>',Charset=utf-8}}"